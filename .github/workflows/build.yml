name: Build Frappe HRMS v16 image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to publish
        required: true
        default: v16
      frappe_branch:
        description: Frappe branch
        required: true
        default: version-16
      platforms:
        description: Target platforms
        required: true
        default: linux/amd64,linux/arm64
  push:
    branches:
      - main
    paths:
      - apps.json
      - .github/workflows/build.yml
  schedule:
    - cron: '23 2 * * 1'

permissions:
  contents: read
  packages: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/frappe-hrms
  FRAPPE_DOCKER_REF: main

jobs:
  build:
    name: Build and push image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout image recipe
        uses: actions/checkout@v4

      - name: Resolve source revisions
        id: revisions
        shell: bash
        run: |
          set -euo pipefail
          FRAPPE_BRANCH="${{ github.event.inputs.frappe_branch || 'version-16' }}"
          HRMS_SHA=$(git ls-remote https://github.com/frappe/hrms.git refs/heads/version-16 | awk '{print $1}')
          ERPNEXT_SHA=$(git ls-remote https://github.com/frappe/erpnext.git refs/heads/version-16 | awk '{print $1}')
          FRAPPE_SHA=$(git ls-remote https://github.com/frappe/frappe.git "refs/heads/${FRAPPE_BRANCH}" | awk '{print $1}')
          echo "hrms_sha=${HRMS_SHA}" >> "$GITHUB_OUTPUT"
          echo "erpnext_sha=${ERPNEXT_SHA}" >> "$GITHUB_OUTPUT"
          echo "frappe_sha=${FRAPPE_SHA}" >> "$GITHUB_OUTPUT"
          echo "cache_bust=${FRAPPE_SHA}-${ERPNEXT_SHA}-${HRMS_SHA}" >> "$GITHUB_OUTPUT"

      - name: Checkout frappe_docker
        uses: actions/checkout@v4
        with:
          repository: frappe/frappe_docker
          ref: ${{ env.FRAPPE_DOCKER_REF }}
          path: frappe_docker

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.event.inputs.image_tag || 'v16' }}
            type=raw,value=version-16
            type=raw,value=latest
            type=sha,prefix=recipe-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: frappe_docker
          file: frappe_docker/images/layered/Containerfile
          platforms: ${{ github.event.inputs.platforms || 'linux/amd64,linux/arm64' }}
          push: true
          provenance: false
          build-args: |
            FRAPPE_PATH=https://github.com/frappe/frappe
            FRAPPE_BRANCH=${{ github.event.inputs.frappe_branch || 'version-16' }}
            CACHE_BUST=${{ steps.revisions.outputs.cache_bust }}
          secret-files: |
            apps_json=apps.json
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.title=Frappe HRMS v16
            org.opencontainers.image.description=Frappe Framework + ERPNext + HRMS version-16 custom image
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            io.frappe.branch=${{ github.event.inputs.frappe_branch || 'version-16' }}
            io.erpnext.revision=${{ steps.revisions.outputs.erpnext_sha }}
            io.hrms.revision=${{ steps.revisions.outputs.hrms_sha }}
